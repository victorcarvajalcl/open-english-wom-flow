<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Número inválido</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="mobile-shell">
    <section class="screen screen-warning" aria-labelledby="page-title">
      <header class="brand-row compact">
        <img class="brand-logo" src="logowhite.png" alt="Open English">
        <span class="wom-badge">WOM</span>
      </header>

      <section class="screen-content">
        <article class="glass-card status-card">
          <div class="status-icon error">!</div>
          <h1 id="page-title">Número inválido</h1>
          <p class="subtitle">El número ingresado no pertenece a una línea WOM habilitada.</p>
          <p class="error-copy">Verifica el número e intenta nuevamente.</p>
          <a class="cta" href="wifi-phone.html">Intentar nuevamente</a>
        </article>

        <footer class="legal">
          La suscripción solo puede activarse con una línea móvil WOM válida.
        </footer>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
