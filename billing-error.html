<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error de cobro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="mobile-shell">
    <section class="screen screen-warning" aria-labelledby="page-title">
      <header class="brand-row compact">
        <img class="brand-logo" src="logowhite.png" alt="Open English">
        <span class="wom-badge">WOM</span>
      </header>

      <section class="screen-content">
        <article class="glass-card status-card">
          <div class="status-icon error">!</div>
          <h1 id="page-title">No fue posible procesar el cobro</h1>
          <p class="subtitle">La activación no se completó porque el cargo no pudo ser procesado.</p>
          <p class="error-copy">Intenta nuevamente más tarde.</p>
          <a class="cta" href="index.html">Volver al inicio</a>
        </article>

        <footer class="legal">
          No se realizará el cargo si la suscripción no queda activada.
        </footer>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
