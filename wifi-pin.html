<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PIN</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<main class="mobile">

<section class="screen">

<img
class="bg"
src="https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=1400&auto=format&fit=crop">

<div class="overlay"></div>

<div class="content">

<header class="brand-row compact">

<img
class="logo"
src="logowhite.png"
alt="Open English">

<span class="wom-badge">
WOM
</span>

</header>

<div class="flow-card glass-card">

<p class="step-label">
Paso 2 de 2
</p>

<h2>
Ingresa el PIN
</h2>

<p class="subtitle">
Revisa el SMS enviado a tu celular.
</p>

<form>

<label class="field-label">
Código PIN
</label>

<div class="pin-field">

<input
type="text"
placeholder="0000"
maxlength="4">

</div>

<a
href="thank-you.html"
class="cta">
Validar PIN
</a>

</form>

</div>

<div class="legal">

El PIN expira en pocos minutos.

</div>

</div>

</section>

</main>

</body>
</html>
