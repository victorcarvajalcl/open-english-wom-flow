<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresa tu celular</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="mobile-shell">
    <section class="screen" aria-labelledby="page-title">
      <header class="brand-row compact">
        <img class="brand-logo" src="logowhite.png" alt="Open English">
        <span class="wom-badge">WOM</span>
      </header>

      <section class="screen-content">
        <article class="glass-card flow-card">
          <p class="step-label">Paso 1 de 2</p>
          <h1 id="page-title">Ingresa tu celular</h1>
          <p class="subtitle">Te enviaremos un PIN por SMS para confirmar la activación.</p>

          <form class="form-stack" data-next="wifi-pin.html">
            <label class="field-label" for="phone">Número WOM</label>
            <div class="input-group">
              <span class="input-prefix">+56</span>
              <input id="phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="9 1234 5678">
            </div>
            <p class="field-help">Solo líneas móviles WOM habilitadas para suscripción.</p>
            <button class="cta" type="submit">Continuar</button>
          </form>
        </article>

        <a class="secondary-link" href="index.html">Volver</a>

        <footer class="legal">
          Al continuar aceptas recibir un SMS de validación para Open English WOM.
        </footer>
      </section>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
