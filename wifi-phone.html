<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WIFI PHONE</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<main class="mobile">

<section class="screen">

<img class="bg"
src="https://images.unsplash.com/photo-1543269865-cbf427effbad?q=80&w=1400&auto=format&fit=crop">

<div class="overlay overlay-deep"></div>

<div class="content">

<header class="brand-row compact">

<img class="logo"
src="logo-white.png">

<span class="wom-badge">
WOM
</span>

</header>

<div class="flow-card glass-card">

<p class="step-label">
Paso 1 de 2
</p>

<h2>
Ingresa tu celular
</h2>

<p class="subtitle">
Te enviaremos un PIN vía SMS.
</p>

<form>

<label class="field-label">
Número WOM
</label>

<div class="phone-field">

<span>+56</span>

<input type="tel"
placeholder="9 1234 5678">

</div>

<a href="wifi-pin.html" class="cta">
Continuar
</a>

</form>

</div>

</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
